<ion-menu contentId="main-content">
  <ion-header>
    <ion-toolbar color="light">
      <ion-title>Menú</ion-title>
    </ion-toolbar>
  </ion-header>
  
  <ion-content>
    <ion-list>
      <ion-item button routerLink="/home" fragment="home" (click)="closeMenu()">
        <ion-icon slot="start" name="home-outline"></ion-icon>
        <ion-label>Inicio</ion-label>
      </ion-item>

      <ion-item button routerLink="/home" fragment="servicios" (click)="closeMenu()">
        <ion-icon slot="start" name="construct-outline"></ion-icon>
        <ion-label>Servicios</ion-label>
      </ion-item>

      <ion-item button routerLink="/home" fragment="portafolio" (click)="closeMenu()">
        <ion-icon slot="start" name="images-outline"></ion-icon>
        <ion-label>Portafolio</ion-label>
      </ion-item>

      <ion-item button routerLink="/home" fragment="contacto" (click)="closeMenu()">
        <ion-icon slot="start" name="mail-outline"></ion-icon>
        <ion-label>Contacto</ion-label>
      </ion-item>
    </ion-list>
  </ion-content>
</ion-menu>

<ion-router-outlet id="main-content"></ion-router-outlet>
